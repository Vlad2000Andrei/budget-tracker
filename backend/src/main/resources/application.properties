spring.application.name=backend
server.port=${BACKEND_PORT:${PORT:19092}}

# Database Configuration (H2 in-memory with PostgreSQL Compatibility Mode)
spring.datasource.url=jdbc:h2:mem:budgetdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.clean-disabled=true

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

# JOOQ Configuration
# spring.jooq.sql-dialect=POSTGRES

# OpenAPI / Swagger UI Configuration
springdoc.swagger-ui.path=/swagger

# Google Sign-In Configuration
# Required — set GOOGLE_CLIENT_ID env var or the application will refuse to start.
app.security.google.client-id=${GOOGLE_CLIENT_ID}

# JWT Configuration
# Required — JWT_SECRET must be a cryptographically secure key of at least 256 bits.
# The application will refuse to start if this env var is not set.
app.security.jwt.secret=${JWT_SECRET}
# Optional — defaults to 1 hour (3 600 000 ms).
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Mock authentication fallback for integration tests only.
# Must be explicitly set to true to enable; defaults to false (disabled in prod & dev).
app.security.mock-user-fallback.enabled=${MOCK_USER_FALLBACK_ENABLED:false}

