spring.application.name=backend
server.port=19092

# Database Configuration (H2 in-memory with PostgreSQL Compatibility Mode)
spring.datasource.url=jdbc:h2:mem:budgetdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.clean-disabled=true

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

# JOOQ Configuration
# spring.jooq.sql-dialect=POSTGRES

# OpenAPI / Swagger UI Configuration
springdoc.swagger-ui.path=/swagger

# Google Sign-In Configuration
app.security.google.client-id=${GOOGLE_CLIENT_ID:your-placeholder-client-id.apps.googleusercontent.com}

# JWT Configuration (JWT secret must be a cryptographically secure key of at least 256 bits)
app.security.jwt.secret=${JWT_SECRET:at-least-256-bit-long-secret-key-for-hmac-sha-256-signing-placeholder}
app.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Enable mock authentication/header fallback for integration tests and local development
app.security.mock-user-fallback.enabled=${MOCK_USER_FALLBACK_ENABLED:true}

