# Test-only overrides — explicit values so tests don't depend on env vars.
# This file is in src/test/resources and takes precedence over src/main/resources
# during test execution only.

# Dummy Google Client ID — token verification is not exercised in unit/integration tests.
app.security.google.client-id=test-google-client-id.apps.googleusercontent.com

# 256-bit test JWT secret — never used outside of the test JVM.
app.security.jwt.secret=test-jwt-secret-key-that-is-at-least-256-bits-long-for-hmac-sha-256

# Short expiry is fine for tests (1 hour).
app.security.jwt.expiration-ms=3600000

# Enable mock user header fallback so integration tests can authenticate without Google.
app.security.mock-user-fallback.enabled=true

# Database Configuration for Tests (with PostgreSQL Compatibility Mode and Lowercase setting)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.test.database.replace=none

# Cookie configuration for tests (HTTP / local testing)
app.security.cookie.secure=false


